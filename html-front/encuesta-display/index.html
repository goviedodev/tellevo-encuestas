<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas de Movilidad</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="container">
        <h1>Encuestas de Movilidad</h1>
        <button id="export-csv">Exportar a CSV</button>
        <div class="table-container">
            <table id="survey-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Email</th>
                        <th>Empresa</th>
                        <th>Tipo Transporte</th>
                        <th>Origen</th>
                        <th>Destino</th>
                        <th>Días</th>
                        <th>Tiempo</th>
                    </tr>
                </thead>
                <tbody id="survey-table-body">
                    <tr class="loading">
                        <td colspan="8">
                            <div class="loading-animation">
                                <div class="spinner"></div>
                                <div>Cargando datos...</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <template id="survey-row">
        <tr>
            <td>{date}</td>
            <td>{email}</td>
            <td>{empresa}</td>
            <td>{tipoTransporte}</td>
            <td>{origen}</td>
            <td>{destino}</td>
            <td>{dias}</td>
            <td>{tiempo}</td>
        </tr>
    </template>

     <script>
        function exportTableToCSV(filename) {
            const table = document.getElementById('survey-table');
            const rows = table.querySelectorAll('tr');
            let csv = [];

            for (let i = 0; i < rows.length; i++) {
                const row = [], cols = rows[i].querySelectorAll('td, th');
                for (let j = 0; j < cols.length; j++) {
                    row.push('"' + cols[j].innerText.replace(/"/g, '""') + '"');
                }
                csv.push(row.join(','));
            }

            const csvContent = csv.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetch('http://34.176.147.67:8001/api/v1/encuestas')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('survey-table-body');
                    tbody.innerHTML = '';

                    data.forEach(survey => {
                        const date = new Date(survey.FECHA).toLocaleDateString();
                        const row = document.getElementById('survey-row').innerHTML
                            .replace('{date}', date)
                            .replace('{email}', survey.EMAIL)
                            .replace('{empresa}', survey.EMPRESA)
                            .replace('{tipoTransporte}', survey.TIPO_TRANSPORTE)
                            .replace('{origen}', survey.ORIGEN)
                            .replace('{destino}', survey.DESTINO)
                            .replace('{dias}', survey.DIAS_ESPECIFICOS)
                            .replace('{tiempo}', survey.TIEMPO_TRABAJO);

                        tbody.insertAdjacentHTML('beforeend', row);
                    });

                    // Add event listener to export button
                    document.getElementById('export-csv').addEventListener('click', function() {
                        exportTableToCSV('encuestas_movilidad.csv');
                    });
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('survey-table-body').innerHTML = `
                        <tr>
                            <td colspan="8" class="error">Error loading data. Please try again later.</td>
                        </tr>
                    `;
                });
        });
    </script>
</body>
</html>
